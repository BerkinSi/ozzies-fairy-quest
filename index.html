        sparkles(this, this.fire.x, this.fire.y, 25, 0xff4400);
        this.time.delayedCall(500, () => { if (this.fire) this.fire.destroy(); if (this.fireZone) this.fireZone.destroy(); });

        // Player powers up flash
        this.tweens.add({ targets: this.player, scaleX: 1.5, scaleY: 1.5, duration: 400, yoyo: true, ease: 'Back.easeOut' });
        const aura = this.add.circle(this.player.x, this.player.y, 30, 0xff6600, 0.25).setDepth(99);
        this.tweens.add({ targets: aura, scaleX: 2.5, scaleY: 2.5, alpha: 0, duration: 800, onComplete: () => aura.destroy() });

        this.time.delayedCall(800, () => {
            showDialog(this, [
                { speaker: 'Fairy', text: "The fire gave me power! Now I can fight the witch directly!" },
                { speaker: 'Witch', text: "You think a little fire can stop ME?! Come and fight!" },
                TOUCH.active ? 'Boss fight! Use D-pad to dodge and fire button to shoot!' : 'Boss fight! Use WASD to dodge, SPACE or click to shoot!'
            ], () => this.startWitchBoss());
        });
    }

    startWitchBoss() {
        this.phase = 'bossFight';
        this.witchHP = 8;
        this.witchMaxHP = 8;
        this.witchBullets = this.physics.add.group();
        this.witchBDir = { x: 1.5, y: 1 };
        this.witchBTimer = 0;
        this.cooldown = 0;

        // Make witch visible and active for the fight
        if (this.witch) this.witch.setAlpha(1);

        // Update HUD for boss fight
        this.broomText.setText('Witch: ' + '🟣'.repeat(this.witchHP));
        this.hpText.setText('You: ' + '❤️'.repeat(Math.max(0, this.playerHP)));

        // Player bullets hit witch
        this.physics.add.overlap(this.iceBalls, this.witch, (witch, b) => {
            if (this.phase !== 'bossFight') return;
            b.destroy();
            this.witchHP--;
            sparkles(this, this.witch.x, this.witch.y, 8, 0xaa44ff);
            this.cameras.main.shake(100, 0.005);
            this.broomText.setText('Witch: ' + '🟣'.repeat(Math.max(0, this.witchHP)) + '⬛'.repeat(Math.max(0, this.witchMaxHP - this.witchHP)));
            // Witch flash red
            if (this.witch && this.witch.active) {
                this.tweens.add({ targets: this.witch, alpha: 0.3, duration: 80, yoyo: true, repeat: 2 });
            }
            if (this.witchHP <= 0) {
                this.witchDead();
            }
        });

        // Witch bullets hit player
        this.physics.add.overlap(this.witchBullets, this.player, (player, b) => {
            if (this.phase !== 'bossFight') return;
            b.destroy();
            this.playerHP--;
            sparkles(this, this.player.x, this.player.y, 6, 0xff4444);
            this.cameras.main.shake(200, 0.008);
            this.hpText.setText('You: ' + '❤️'.repeat(Math.max(0, this.playerHP)) + '🖤'.repeat(Math.max(0, 5 - this.playerHP)));
            if (this.playerHP <= 0) {
                this.phase = 'dead';
                showDialog(this, ['The witch got you!', "Let's try again!"], () => this.scene.restart());
            }
        });
    }

    witchShoot() {
        if (!this.witch || !this.witch.active || this.phase !== 'bossFight') return;
        // Shoot 3 spread projectiles
        for (let i = -1; i <= 1; i++) {
            const b = this.add.circle(this.witch.x, this.witch.y, 5, 0xaa44ff).setDepth(95);
            this.witchBullets.add(b);
            this.physics.add.existing(b);
            const a = Phaser.Math.Angle.Between(this.witch.x, this.witch.y, this.player.x, this.player.y) + i * 0.25;
            b.body.setVelocity(Math.cos(a) * 160, Math.sin(a) * 160);
            this.time.delayedCall(3000, () => { if (b.active) b.destroy(); });
        }
    }

    witchDead() {
        this.phase = 'witchDead';
        this.player.body.setVelocity(0);

        // Dramatic witch defeat: explosion rings + spin + disintegrate
        for (let ring = 0; ring < 4; ring++) {
            const r = this.add.circle(this.witch.x, this.witch.y, 5, 0xaa44ff, 0.5).setDepth(200);
            this.tweens.add({ targets: r, scaleX: 12 + ring * 3, scaleY: 12 + ring * 3, alpha: 0, duration: 700, delay: ring * 120, onComplete: () => r.destroy() });
        }
        sparkles(this, this.witch.x, this.witch.y, 35, 0xaa44ff);
        this.tweens.add({
            targets: this.witch, alpha: 0, scaleX: 1.5, scaleY: 1.5, angle: 720, duration: 1200,
            onComplete: () => {
                sparkles(this, this.witch.x, this.witch.y, 30, 0xaa44ff);
                this.witch.destroy();
                this.hatScene();
            }
        });
    }

    hatScene() {
        const hat = this.add.container(600, H - 130);
        hat.add(this.add.triangle(0, 0, -15, 15, 0, -15, 15, 15, 0x440088));
        hat.add(this.add.rectangle(0, 13, 35, 5, 0x440088));
        hat.add(this.add.circle(-5, 5, 2, 0xffdd00));
        hat.add(this.add.circle(5, 5, 2, 0xffdd00));
        hat.setDepth(110);
        this.tweens.add({ targets: hat, y: hat.y - 8, duration: 500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

        showDialog(this, [
            { speaker: 'Hat', text: 'I can talk! The witch cursed me long ago...' },
            { speaker: 'Hat', text: 'The Sun and Moon gods weakened her, but I was still trapped!' },
            { speaker: 'Hat', text: "Wear me and I'll give you MAGICAL POWERS!" },
            { speaker: 'Hat', text: "You'll need them in Chapter 15... trust me!" },
            { speaker: 'Fairy', text: "Of course! Let's do this!" },
        ], () => {
            // Hat flies to player with trail
            const trail = [];
            const trailTimer = this.time.addEvent({
                delay: 40, repeat: 12, callback: () => {
                    const t = this.add.circle(hat.x, hat.y, 4, 0xaa44ff, 0.5).setDepth(109);
                    trail.push(t);
                    this.tweens.add({ targets: t, alpha: 0, scaleX: 0, scaleY: 0, duration: 400, onComplete: () => t.destroy() });
                }
            });
            this.tweens.add({
                targets: hat, x: this.player.x, y: this.player.y - 25, duration: 600, ease: 'Cubic.easeIn',
                onComplete: () => {
                    hat.setScale(0.6);
                    // POWER UP! Big flash + expanding rainbow rings
                    const flash = this.add.rectangle(W/2, H/2, W, H, 0xffffff, 0.6).setDepth(300);
                    this.tweens.add({ targets: flash, alpha: 0, duration: 500, onComplete: () => flash.destroy() });
                    // Rainbow rings
                    const colors = [0xff4444, 0xff8844, 0xffdd44, 0x44ff44, 0x4488ff, 0xaa44ff];
                    colors.forEach((col, i) => {
                        const ring = this.add.circle(this.player.x, this.player.y, 5, col, 0).setDepth(250);
                        ring.setStrokeStyle(3, col);
                        this.tweens.add({ targets: ring, scaleX: 15 + i * 3, scaleY: 15 + i * 3, alpha: 0, duration: 1000, delay: i * 80, onComplete: () => ring.destroy() });
                    });
                    // Player glows and grows briefly
                    this.tweens.add({ targets: this.player, scaleX: 1.5, scaleY: 1.5, duration: 300, yoyo: true, repeat: 2, ease: 'Sine.easeInOut' });
                    sparkles(this, this.player.x, this.player.y, 40, 0xaa44ff);
                    this.time.delayedCall(400, () => sparkles(this, this.player.x, this.player.y, 30, 0xffd700));

                    STATE.powers.push('Witch Hat', 'Staff Powers', 'Super Speed', 'Freezing', 'Lava Power', 'Super Jump');
                    this.time.delayedCall(1200, () => {
                        showDialog(this, [
                            '🎩 Witch Hat acquired!',
                            '🪄 Staff Powers: Immobilize & Silence!',
                            '⚡ Super Speed acquired!',
                            '🧊 Freezing, 🌋 Lava, and 🦘 Super Jump acquired!',
                            { speaker: 'Hat', text: 'Remember: save the strongest powers for Chapter 15!' },
                            { speaker: 'Fairy', text: "I found the wizard's staff too! What an adventure!" }
                        ], () => this.showFairyWithHat());
                    });
                }
            });
        });
    }

    showFairyWithHat() {
        // Full-screen dramatic reveal of fairy wearing the hat
        const ov = this.add.rectangle(W / 2, H / 2, W, H, 0x0a0020, 0).setDepth(4000);
        this.tweens.add({ targets: ov, alpha: 1, duration: 600 });

        this.time.delayedCall(700, () => {
            // Spotlight effect
            const spotlight = this.add.circle(W / 2, 280, 80, 0x221144, 0.4).setDepth(4001);
            this.tweens.add({ targets: spotlight, scaleX: 1.8, scaleY: 1.8, alpha: 0.15, duration: 1500, yoyo: true, repeat: -1 });

            // Big fairy in center
            const bigFairy = createFairy(this, W / 2, 300, 0x88ff88, 0xaaffaa, true);
            bigFairy.setScale(3).setDepth(4005);

            // Hat on the fairy
            const bigHat = this.add.container(W / 2, 260);
            bigHat.add(this.add.triangle(0, 0, -20, 20, 0, -20, 20, 20, 0x440088));
            bigHat.add(this.add.rectangle(0, 17, 48, 7, 0x440088));
            bigHat.add(this.add.circle(-7, 7, 3, 0xffdd00));
            bigHat.add(this.add.circle(7, 7, 3, 0xffdd00));
            bigHat.setScale(3).setDepth(4006).setAlpha(0);
            this.tweens.add({ targets: bigHat, alpha: 1, y: 245, duration: 800, delay: 300, ease: 'Bounce.easeOut' });

            // Staff
            const staff = this.add.container(W / 2 + 55, 320);
            staff.add(this.add.rectangle(0, 0, 6, 70, 0x8B4513));
            staff.add(this.add.circle(0, -35, 10, 0xaa44ff));
            staff.setScale(3).setDepth(4004).setAlpha(0);
            this.tweens.add({ targets: staff, alpha: 1, duration: 600, delay: 600 });

            // Rotating sparkles around the fairy
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                const dist = 120;
                const s = this.add.circle(W / 2 + Math.cos(angle) * dist, 280 + Math.sin(angle) * dist, 4, [0xffd700, 0x88ddff, 0xaa44ff, 0xff8844][i % 4], 0.7).setDepth(4003);
                this.tweens.add({
                    targets: s, angle: 360, duration: 3000, repeat: -1,
                    x: { value: W / 2 + Math.cos(angle + Math.PI) * dist, duration: 3000, repeat: -1 },
                    y: { value: 280 + Math.sin(angle + Math.PI) * dist, duration: 3000, repeat: -1 }
                });
            }

            // Title
            const title = this.add.text(W / 2, 440, 'The Fairy is ready for Chapter 15!', {
                fontSize: '22px', fontFamily: 'Georgia', color: '#ffd700', fontStyle: 'bold'
            }).setOrigin(0.5).setDepth(4010).setAlpha(0);
            this.tweens.add({ targets: title, alpha: 1, duration: 800, delay: 1000 });
            this.tweens.add({ targets: title, y: 435, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.easeInOut', delay: 1000 });

            // Continue prompt
            const cont = this.add.text(W / 2, 510, TOUCH.active ? '[ tap to continue ]' : '[ click to continue ]', {
                fontSize: '14px', color: '#888'
            }).setOrigin(0.5).setDepth(4010).setAlpha(0);
            this.tweens.add({ targets: cont, alpha: 0.6, duration: 500, delay: 2000 });
            this.tweens.add({ targets: cont, alpha: 0.3, duration: 600, yoyo: true, repeat: -1, delay: 2500 });

            // Click to proceed
            this.time.delayedCall(2000, () => {
                this.input.once('pointerdown', () => {
                    this.tweens.add({
                        targets: [ov, spotlight, bigFairy, bigHat, staff, title, cont],
                        alpha: 0, duration: 600,
                        onComplete: () => this.chapterDone()
                    });
                });
            });
        });
    }

    chapterDone() {
        const ov = this.add.rectangle(W / 2, H / 2, W, H, 0x000000, 0).setDepth(3000);
        this.tweens.add({
            targets: ov, alpha: 0.85, duration: 800,
            onComplete: () => {
                this.add.text(W / 2, 180, 'Chapter 3 Complete!', {
                    fontSize: '36px', fontFamily: 'Georgia', color: '#bb66ff', fontStyle: 'bold'
                }).setOrigin(0.5).setDepth(3001);
                this.add.text(W / 2, 240, '🎩 Hat  🪄 Staff  ⚡ Speed  🧊 Freeze  🌋 Lava  🦘 Jump', {
                    fontSize: '13px', color: '#cc88ff'
                }).setOrigin(0.5).setDepth(3001);
                const btn = this.add.rectangle(W / 2, 380, 200, 50, 0x8844aa)
                    .setStrokeStyle(2, 0xaa66cc).setDepth(3001).setInteractive({ useHandCursor: true });
                this.add.text(W / 2, 380, 'Finish →', { fontSize: '22px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setDepth(3002);
                btn.on('pointerdown', () => {
                    this.cameras.main.fadeOut(500);
                    this.time.delayedCall(500, () => this.scene.start('EndScene'));
                });
            }
        });
    }

    update() {
        if (!this.player || !this.player.body) return;
        if (this.cooldown > 0) this.cooldown--;
        const activePhases = ['fight', 'findFire', 'bossFight'];
        if (this._dialogBlocked || !activePhases.includes(this.phase)) {
            if (this.player.body) this.player.body.setVelocity(0);
            return;
        }
        let vx = 0, vy = 0;
        if (TOUCH.active && (TOUCH.joyX !== 0 || TOUCH.joyY !== 0)) {
            vx = TOUCH.joyX * FAIRY_SPEED; vy = TOUCH.joyY * FAIRY_SPEED;
        } else {
            if (this.cursors.left.isDown || this.wasd.left.isDown) vx = -FAIRY_SPEED;
            if (this.cursors.right.isDown || this.wasd.right.isDown) vx = FAIRY_SPEED;
            if (this.cursors.up.isDown || this.wasd.up.isDown) vy = -FAIRY_SPEED;
            if (this.cursors.down.isDown || this.wasd.down.isDown) vy = FAIRY_SPEED;
        }
        this.player.body.setVelocity(vx, vy);
        if (vx < 0) this.player.setAngle(-8);
        else if (vx > 0) this.player.setAngle(8);
        else this.player.setAngle(0);

        // Update facing direction when moving
        if (vx !== 0 || vy !== 0) {
            this.facingX = vx;
            this.facingY = vy;
        }

        // Spacebar shoot — fires in facing direction
        if (Phaser.Input.Keyboard.JustDown(this.spaceKey) && activePhases.includes(this.phase) && !this._dialogActive) {
            const dist = 300;
            this.shootIce({ x: this.player.x + this.facingX * dist, y: this.player.y + this.facingY * dist });
        }

        // Touch fire button — shoot in facing direction
        if (TOUCH.fire && activePhases.includes(this.phase)) {
            const dist = 300;
            this.shootIce({ x: this.player.x + this.facingX * dist, y: this.player.y + this.facingY * dist });
            TOUCH.fire = false;
        }

        // Witch boss AI — bounces around and shoots purple orbs
        if (this.phase === 'bossFight' && this.witch && this.witch.active && this.witchHP > 0) {
            this.witch.x += this.witchBDir.x;
            this.witch.y += this.witchBDir.y;
            if (this.witch.x > W - 40 || this.witch.x < 40) this.witchBDir.x *= -1;
            if (this.witch.y > H - 80 || this.witch.y < 60) this.witchBDir.y *= -1;
            this.witchBTimer++;
            // Shoot every 60 frames (~1 second), faster as HP drops
            const shootInterval = Math.max(30, 60 - (this.witchMaxHP - this.witchHP) * 4);
            if (this.witchBTimer > shootInterval) { this.witchBTimer = 0; this.witchShoot(); }
        }
    }
}

// ==========================================
// END SCENE
// ==========================================
class EndScene extends Phaser.Scene {
    constructor() { super('EndScene'); }
    create() {
        this.cameras.main.fadeIn(800);
        const bg = this.add.graphics();
        bg.fillGradientStyle(0x1a0a3e, 0x0a2060, 0x1a0a3e, 0x0a2060);
        bg.fillRect(0, 0, W, H);

        for (let i = 0; i < 100; i++) {
            const st = this.add.circle(Phaser.Math.Between(0, W), Phaser.Math.Between(0, H),
                Phaser.Math.Between(1, 3), 0xffffff, Phaser.Math.FloatBetween(0.2, 0.9));
            this.tweens.add({ targets: st, alpha: 0.1, duration: Phaser.Math.Between(800, 2500), yoyo: true, repeat: -1 });
        }

        this.time.addEvent({
            delay: 200, loop: true, callback: () => {
                const sx = Phaser.Math.Between(50, W - 50), sy = Phaser.Math.Between(50, H - 50);
                const s = this.add.circle(sx, sy, 2,
                    Phaser.Math.RND.pick([0xffd700, 0xff44aa, 0x44ccff, 0x88ff88]), 0.8);
                this.tweens.add({ targets: s, alpha: 0, scaleX: 0, scaleY: 0, y: sy - 20, duration: 800, onComplete: () => s.destroy() });
            }
        });

        const fairy = createFairy(this, W / 2, 310);
        fairy.setDepth(10);
        this.tweens.add({ targets: fairy, y: 300, duration: 600, yoyo: true, repeat: -1, ease: 'Bounce.easeOut' });

        this.add.text(W / 2, 70, 'Congratulations!', {
            fontSize: '42px', fontFamily: 'Georgia', color: '#ffd700',
            fontStyle: 'bold', stroke: '#8B6914', strokeThickness: 3
        }).setOrigin(0.5);

        this.add.text(W / 2, 120, 'You completed Chapters 1-3!', { fontSize: '20px', color: '#ddbbff' }).setOrigin(0.5);

        this.add.text(W / 2, 190, 'To Be Continued...', {
            fontSize: '28px', fontFamily: 'Georgia', color: '#ff88cc', fontStyle: 'italic'
        }).setOrigin(0.5);
        this.add.text(W / 2, 230, 'Chapters 4-15 Coming Soon!', { fontSize: '16px', color: '#88aadd' }).setOrigin(0.5);

        this.add.text(W / 2, 390, 'Your Powers:', { fontSize: '14px', color: '#aaa' }).setOrigin(0.5);
        this.add.text(W / 2, 415, '🌀 🏹 ⚔️ 🔥 📿 ❄️ 🧊 ⛄ 🗡️ 🎩 🪄 ⚡ 🌋 🦘', { fontSize: '18px' }).setOrigin(0.5);

        this.add.text(W / 2, 470, 'Game Designed by Ozan', {
            fontSize: '22px', fontFamily: 'Georgia', color: '#ffdd88', fontStyle: 'bold'
        }).setOrigin(0.5);
        this.add.text(W / 2, 505, 'Built with love', { fontSize: '16px', color: '#8888aa' }).setOrigin(0.5);
        this.add.text(W / 2, 535, 'Happy Birthday Ozan!', { fontSize: '18px', color: '#ff88aa' }).setOrigin(0.5);

        const btn = this.add.rectangle(W / 2, H - 30, 160, 35, 0x44aa44, 0.8)
            .setStrokeStyle(2, 0x66cc66).setInteractive({ useHandCursor: true });
        this.add.text(W / 2, H - 30, 'Play Again', { fontSize: '16px', color: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        btn.on('pointerdown', () => {
            STATE.powers = [];
            STATE.health = 5;
            this.cameras.main.fadeOut(500);
            this.time.delayedCall(500, () => this.scene.start('TitleScene'));
        });
    }
}

// ==========================================
// GAME CONFIG
// ==========================================
const isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const controlsHeight = isMobile ? 140 : 0;

const config = {
    type: Phaser.AUTO,
    parent: 'game-container',
    width: W,
    height: H,
    backgroundColor: '#0a0015',
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        max: { width: W, height: H }
    },
    scene: [TitleScene, Chapter1Scene, Chapter2Scene, Chapter3Scene, EndScene]
};

// On mobile, shrink the container so game + controls fit without overlap
if (isMobile) {
    const container = document.getElementById('game-container');
    container.style.height = (window.innerHeight - controlsHeight) + 'px';
    window.addEventListener('resize', () => {
        container.style.height = (window.innerHeight - controlsHeight) + 'px';
    });
}

const game = new Phaser.Game(config);
